<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Still Relevant — Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #FDFAF5;
      --ink:   #1A1A1A;
      --rust:  #C4603A;
    }

    html, body {
      background: #D5CCC0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 16px 60px;
      font-family: 'Inter', sans-serif;
    }

    /* ──────────────────────────────────────────
       COVER
       680 × 960px = standard ebook aspect ratio
       For Chrome print-to-PDF:
         Open file → Cmd+P → Save as PDF
         Paper size: Custom 6.8" × 9.6"
         Margins: None  Scale: 100%
    ────────────────────────────────────────── */
    .cover {
      width: 680px;
      height: 960px;
      background: var(--cream);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 16px 80px rgba(0,0,0,0.20);
      flex-shrink: 0;
      overflow: hidden;
    }

    .bar-top, .bar-bottom {
      width: 100%;
      height: 8px;
      background: var(--rust);
      flex-shrink: 0;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--rust);
      margin-top: 46px;
    }

    /* Canvas holds the hand illustration */
    #handCanvas {
      display: block;
      margin-top: 24px;
      flex-shrink: 0;
    }

    .title-block {
      text-align: center;
      padding: 0 64px;
      margin-top: 14px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 82px;
      font-weight: 600;
      line-height: 0.88;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .rule {
      width: 44px;
      height: 1.5px;
      background: var(--rust);
      margin: 22px auto 19px;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 0.05em;
      opacity: 0.78;
      line-height: 1.5;
    }

    .lower {
      margin-top: auto;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
    }

    .product-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.38;
    }

    .site {
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.26;
    }

    @media print {
      html, body { background: white; padding: 0; }
      .cover { box-shadow: none; }
      @page { size: 6.8in 9.6in; margin: 0; }
    }
  </style>
</head>
<body>
<div class="cover">

  <div class="bar-bottom"></div>

</div><!-- .cover -->

<script>
// ═══════════════════════════════════════════════════════════════
// HAND + COMPASS ILLUSTRATION — Canvas
//
// Technique: tapered bezier strokes.
// Each "stroke" is drawn by interpolating a cubic bezier curve
// into small line segments, varying lineWidth per segment.
// This gives the true ink-pen effect: thick where the pen
// presses hard (wrist, palm), thin where it lifts (fingertips).
//
// The compass is drawn with thin, precise strokes.
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('handCanvas');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

// Retina-quality rendering
canvas.width  = 400 * DPR;
canvas.height = 400 * DPR;
canvas.style.width  = '400px';
canvas.style.height = '400px';
ctx.scale(DPR, DPR);

const INK  = '#1A1A1A';
const RUST = '#C4603A';
const CREAM = '#FDFAF5';

// ── Utility: evaluate cubic bezier at t ──────────────────
function bezier(t, p0, p1, p2, p3) {
  const mt = 1 - t;
  return {
    x: mt*mt*mt*p0.x + 3*mt*mt*t*p1.x + 3*mt*t*t*p2.x + t*t*t*p3.x,
    y: mt*mt*mt*p0.y + 3*mt*mt*t*p1.y + 3*mt*t*t*p2.y + t*t*t*p3.y
  };
}

// ── Tapered stroke along a cubic bezier ──────────────────
// p0,p1,p2,p3: control points {x,y}
// w0: start stroke-width, w1: end stroke-width
// steps: subdivision count (higher = smoother)
// alpha: opacity
// addJitter: tiny random deviation to simulate hand imperfection
function taperedStroke(p0, p1, p2, p3, w0, w1, steps = 80, alpha = 1.0, addJitter = false) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = INK;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let prev = bezier(0, p0, p1, p2, p3);

  for (let i = 1; i <= steps; i++) {
    const t    = i / steps;
    const curr = bezier(t, p0, p1, p2, p3);

    // Apply tiny jitter to simulate imperfect ink line
    let jx = 0, jy = 0;
    if (addJitter) {
      jx = (Math.random() - 0.5) * 0.4;
      jy = (Math.random() - 0.5) * 0.4;
    }

    ctx.beginPath();
    ctx.lineWidth = w0 + (w1 - w0) * t;
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(curr.x + jx, curr.y + jy);
    ctx.stroke();

    prev = curr;
  }

  ctx.restore();
}

// ── Simple arc stroke (for fingertips, compass) ──────────────
function arcStroke(cx, cy, r, startAngle, endAngle, w, alpha = 1.0, color = INK) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth   = w;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.stroke();
  ctx.restore();
}

// ── Line segment ─────────────────────────────────────────────
function line(x1, y1, x2, y2, w, alpha = 1.0, color = INK) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth   = w;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

// ── Circle (stroke only) ─────────────────────────────────────
function circle(cx, cy, r, w, alpha = 1.0, color = INK, fill = null) {
  ctx.save();
  ctx.globalAlpha = alpha;
  if (fill) {
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.strokeStyle = color;
  ctx.lineWidth   = w;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ── Fill polygon ────────────────────────────────────────────
function fillPoly(pts, color, alpha = 1.0) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle   = color;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ════════════════════════════════════════════════════════════════
// DRAWING — coordinate space 400×400
//
// Layout:
//   Wrist enters from lower-left (~80,395)
//   Palm occupies center-left (~100-260, 300-350)
//   Fingers point upward, spreading right
//   Compass sits in palm cup centered ~(220, 190)
//   Thumb sweeps upper-left from palm base
// ════════════════════════════════════════════════════════════════

// Seed the jitter so it's reproducible
let _seed = 42;
const savedRandom = Math.random;
Math.random = () => {
  _seed = (_seed * 16807 + 0) % 2147483647;
  return (_seed - 1) / 2147483646;
};

// ── WRIST ────────────────────────────────────────────────────
// Two edges: outer (ulnar, right side of wrist) and inner (radial, left)
// They converge into the palm, giving the wrist its tapered form.

// Outer wrist edge — heaviest, enters from lower-left
taperedStroke(
  {x:64, y:400}, {x:68, y:370}, {x:74, y:340}, {x:84, y:316},
  3.4, 2.8, 90, 1.0, true
);
taperedStroke(
  {x:84, y:316}, {x:92, y:298}, {x:102, y:286}, {x:118, y:278},
  2.8, 2.4, 70, 1.0, true
);

// Inner wrist edge — slightly thinner, parallel
taperedStroke(
  {x:88, y:400}, {x:92, y:368}, {x:96, y:338}, {x:104, y:314},
  2.9, 2.4, 80, 1.0, true
);
taperedStroke(
  {x:104, y:314}, {x:112, y:296}, {x:122, y:284}, {x:136, y:276},
  2.4, 2.0, 60, 1.0, true
);

// Wrist crease 1
taperedStroke(
  {x:68, y:358}, {x:76, y:356}, {x:86, y:356}, {x:94, y:358},
  0.9, 0.7, 30, 0.28, false
);
// Wrist crease 2
taperedStroke(
  {x:66, y:376}, {x:74, y:374}, {x:84, y:374}, {x:92, y:376},
  0.8, 0.6, 30, 0.20, false
);

// ── PALM ─────────────────────────────────────────────────────
// Lower palm arc (thumb side)
taperedStroke(
  {x:118, y:278}, {x:142, y:270}, {x:168, y:264}, {x:196, y:262},
  2.6, 2.4, 70, 1.0, true
);
taperedStroke(
  {x:196, y:262}, {x:214, y:260}, {x:226, y:260}, {x:238, y:262},
  2.4, 2.2, 50, 1.0, true
);

// Upper palm arc (pinky side)
taperedStroke(
  {x:104, y:314}, {x:130, y:308}, {x:158, y:302}, {x:184, y:298},
  2.6, 2.2, 70, 1.0, true
);
taperedStroke(
  {x:184, y:298}, {x:206, y:294}, {x:224, y:292}, {x:240, y:292},
  2.2, 2.0, 50, 1.0, true
);

// Palm cup contour (the hollow — very organic, light)
taperedStroke(
  {x:148, y:288}, {x:166, y:281}, {x:186, y:276}, {x:206, y:274},
  1.4, 1.1, 50, 0.50, true
);
taperedStroke(
  {x:206, y:274}, {x:216, y:272}, {x:226, y:272}, {x:234, y:274},
  1.1, 1.0, 30, 0.48, true
);

// Knuckle ridge (where fingers meet palm)
taperedStroke(
  {x:162, y:266}, {x:182, y:262}, {x:202, y:260}, {x:220, y:260},
  1.2, 1.0, 50, 0.35, false
);
taperedStroke(
  {x:220, y:260}, {x:232, y:260}, {x:244, y:262}, {x:254, y:265},
  1.0, 0.9, 30, 0.30, false
);

// ── THUMB ────────────────────────────────────────────────────
// Inner contour: exits palm, curves to tip
taperedStroke(
  {x:122, y:282}, {x:116, y:262}, {x:112, y:240}, {x:114, y:220},
  2.8, 2.2, 80, 1.0, true
);
taperedStroke(
  {x:114, y:220}, {x:116, y:204}, {x:122, y:193}, {x:132, y:189},
  2.2, 1.6, 60, 1.0, true
);

// Outer contour: sweeps parallel
taperedStroke(
  {x:136, y:278}, {x:130, y:260}, {x:127, y:242}, {x:128, y:224},
  2.4, 1.9, 70, 1.0, true
);
taperedStroke(
  {x:128, y:224}, {x:130, y:208}, {x:136, y:197}, {x:146, y:192},
  1.9, 1.5, 50, 1.0, true
);

// Thumb tip arc — line doubles over itself
taperedStroke(
  {x:132, y:189}, {x:138, y:182}, {x:146, y:180}, {x:152, y:186},
  1.5, 1.3, 40, 0.82, false
);
taperedStroke(
  {x:152, y:186}, {x:156, y:192}, {x:156, y:200}, {x:152, y:208},
  1.3, 1.6, 35, 0.75, false
);

// Thumb web — the V-shaped connection between thumb and index
taperedStroke(
  {x:136, y:278}, {x:138, y:272}, {x:144, y:268}, {x:152, y:266},
  1.8, 1.4, 30, 0.55, false
);

// ── INDEX FINGER ─────────────────────────────────────────────
// Inner contour (left side of finger going up)
taperedStroke(
  {x:172, y:264}, {x:170, y:244}, {x:168, y:220}, {x:168, y:200},
  2.4, 1.8, 80, 1.0, true
);
taperedStroke(
  {x:168, y:200}, {x:168, y:184}, {x:170, y:172}, {x:174, y:165},
  1.8, 1.4, 50, 1.0, true
);

// Outer contour (right side)
taperedStroke(
  {x:190, y:264}, {x:190, y:246}, {x:190, y:224}, {x:190, y:204},
  2.2, 1.7, 70, 1.0, true
);
taperedStroke(
  {x:190, y:204}, {x:190, y:188}, {x:188, y:174}, {x:184, y:167},
  1.7, 1.4, 45, 1.0, true
);

// Fingertip arc
taperedStroke(
  {x:174, y:165}, {x:176, y:157}, {x:182, y:153}, {x:188, y:155},
  1.4, 1.2, 35, 0.80, false
);
taperedStroke(
  {x:188, y:155}, {x:194, y:158}, {x:196, y:165}, {x:194, y:174},
  1.2, 1.5, 30, 0.76, false
);

// Middle joint crease
taperedStroke(
  {x:170, y:224}, {x:176, y:221}, {x:184, y:221}, {x:190, y:224},
  0.7, 0.6, 25, 0.26, false
);

// ── MIDDLE FINGER ────────────────────────────────────────────
// Inner contour
taperedStroke(
  {x:200, y:263}, {x:200, y:244}, {x:200, y:222}, {x:200, y:202},
  2.4, 1.8, 80, 1.0, true
);
taperedStroke(
  {x:200, y:202}, {x:200, y:184}, {x:202, y:170}, {x:206, y:162},
  1.8, 1.4, 55, 1.0, true
);

// Outer contour
taperedStroke(
  {x:218, y:263}, {x:220, y:244}, {x:220, y:222}, {x:220, y:202},
  2.2, 1.7, 75, 1.0, true
);
taperedStroke(
  {x:220, y:202}, {x:220, y:184}, {x:218, y:170}, {x:214, y:162},
  1.7, 1.4, 50, 1.0, true
);

// Fingertip
taperedStroke(
  {x:206, y:162}, {x:208, y:154}, {x:214, y:150}, {x:220, y:152},
  1.4, 1.2, 35, 0.80, false
);
taperedStroke(
  {x:220, y:152}, {x:226, y:154}, {x:228, y:162}, {x:226, y:172},
  1.2, 1.5, 30, 0.76, false
);

// Middle joint crease
taperedStroke(
  {x:202, y:224}, {x:208, y:221}, {x:214, y:221}, {x:220, y:224},
  0.7, 0.6, 25, 0.25, false
);

// ── RING FINGER ──────────────────────────────────────────────
// Inner contour
taperedStroke(
  {x:228, y:265}, {x:228, y:248}, {x:228, y:228}, {x:228, y:210},
  2.2, 1.7, 75, 1.0, true
);
taperedStroke(
  {x:228, y:210}, {x:228, y:194}, {x:228, y:181}, {x:226, y:174},
  1.7, 1.4, 50, 1.0, true
);

// Outer contour
taperedStroke(
  {x:244, y:267}, {x:244, y:250}, {x:244, y:230}, {x:244, y:212},
  2.0, 1.6, 70, 1.0, true
);
taperedStroke(
  {x:244, y:212}, {x:244, y:196}, {x:242, y:183}, {x:238, y:176},
  1.6, 1.3, 45, 1.0, true
);

// Fingertip
taperedStroke(
  {x:226, y:174}, {x:228, y:165}, {x:234, y:162}, {x:240, y:165},
  1.4, 1.2, 35, 0.78, false
);
taperedStroke(
  {x:240, y:165}, {x:246, y:168}, {x:248, y:176}, {x:246, y:186},
  1.2, 1.5, 30, 0.74, false
);

// Ring joint crease
taperedStroke(
  {x:229, y:228}, {x:234, y:225}, {x:240, y:225}, {x:245, y:228},
  0.7, 0.5, 22, 0.23, false
);

// ── LITTLE FINGER ────────────────────────────────────────────
// Inner contour
taperedStroke(
  {x:254, y:270}, {x:254, y:255}, {x:254, y:238}, {x:252, y:222},
  2.0, 1.5, 70, 1.0, true
);
taperedStroke(
  {x:252, y:222}, {x:250, y:208}, {x:248, y:197}, {x:244, y:192},
  1.5, 1.2, 45, 1.0, true
);

// Outer contour
taperedStroke(
  {x:266, y:272}, {x:268, y:256}, {x:268, y:238}, {x:265, y:222},
  1.8, 1.4, 65, 1.0, true
);
taperedStroke(
  {x:265, y:222}, {x:262, y:208}, {x:258, y:198}, {x:254, y:194},
  1.4, 1.1, 40, 1.0, true
);

// Fingertip
taperedStroke(
  {x:244, y:192}, {x:246, y:184}, {x:252, y:181}, {x:256, y:184},
  1.2, 1.0, 30, 0.74, false
);
taperedStroke(
  {x:256, y:184}, {x:262, y:188}, {x:264, y:196}, {x:262, y:204},
  1.0, 1.3, 28, 0.70, false
);

// Little joint crease
taperedStroke(
  {x:253, y:242}, {x:258, y:239}, {x:263, y:239}, {x:267, y:242},
  0.6, 0.5, 20, 0.21, false
);

// ── OUTER PALM EDGE (PINKY SIDE) ─────────────────────────────
// Connects wrist outer edge to little finger base
taperedStroke(
  {x:240, y:292}, {x:248, y:286}, {x:256, y:280}, {x:262, y:273},
  2.2, 1.9, 50, 1.0, true
);
taperedStroke(
  {x:262, y:273}, {x:266, y:274}, {x:268, y:274}, {x:266, y:272},
  1.9, 1.8, 20, 1.0, false
);

// ════════════════════════════════════════════════════════════════
// COMPASS
// Crisp, geometric. Sits in the palm cup at center (200, 192).
// Precise contrast to the organic hand.
// ════════════════════════════════════════════════════════════════

const CX = 198, CY = 194; // compass center
const R  = 54;             // outer radius

// Fill compass background (cream so it sits on palm)
ctx.save();
ctx.fillStyle = CREAM;
ctx.globalAlpha = 0.97;
ctx.beginPath();
ctx.arc(CX, CY, R, 0, Math.PI * 2);
ctx.fill();
ctx.restore();

// Outer bezel ring
circle(CX, CY, R,     1.8, 1.0, INK);
// Inner bezel ring
circle(CX, CY, R - 6, 0.6, 0.42, INK);
// Degree-mark dashes ring (very faint)
ctx.save();
ctx.globalAlpha = 0.16;
ctx.strokeStyle = INK;
ctx.lineWidth   = 0.4;
ctx.setLineDash([1.4, 4.2]);
ctx.beginPath();
ctx.arc(CX, CY, R - 10, 0, Math.PI * 2);
ctx.stroke();
ctx.setLineDash([]);
ctx.restore();

// Inner dial circle
circle(CX, CY, 24, 0.55, 0.26, INK);

// Cardinal ticks — N S E W
// N
line(CX,          CY - R + 1, CX,          CY - R + 10, 2.0, 1.0);
// S
line(CX,          CY + R - 1, CX,          CY + R - 10, 2.0, 1.0);
// E
line(CX + R - 1,  CY,         CX + R - 10, CY,          2.0, 1.0);
// W
line(CX - R + 1,  CY,         CX - R + 10, CY,          2.0, 1.0);

// Intercardinal ticks — smaller
const ic = 0.7071; // cos/sin 45°
const iR = R - 2;
const iLen = 6;
line(CX + ic*(iR),     CY - ic*(iR),     CX + ic*(iR-iLen),  CY - ic*(iR-iLen),  1.0, 0.48);
line(CX - ic*(iR),     CY - ic*(iR),     CX - ic*(iR-iLen),  CY - ic*(iR-iLen),  1.0, 0.48);
line(CX + ic*(iR),     CY + ic*(iR),     CX + ic*(iR-iLen),  CY + ic*(iR-iLen),  1.0, 0.48);
line(CX - ic*(iR),     CY + ic*(iR),     CX - ic*(iR-iLen),  CY + ic*(iR-iLen),  1.0, 0.48);

// N label
ctx.save();
ctx.font         = '500 10px Inter, sans-serif';
ctx.fillStyle    = INK;
ctx.globalAlpha  = 1.0;
ctx.textAlign    = 'center';
ctx.textBaseline = 'bottom';
ctx.fillText('N', CX, CY - R + 12);
ctx.restore();

// Cross-hair hairlines
line(CX, CY - 22, CX, CY + 22, 0.4, 0.14);
line(CX - 22, CY, CX + 22, CY, 0.4, 0.14);

// ── NEEDLE ────────────────────────────────────────────────────
// North (rust) — long tapered diamond, pointing true north
// Slight rightward lean baked in via control points (authentic imperfection)
fillPoly([
  {x: CX,     y: CY - 48},   // north tip
  {x: CX + 5, y: CY - 4},    // right shoulder
  {x: CX,     y: CY + 2},    // center
  {x: CX - 5, y: CY - 4}     // left shoulder
], RUST, 0.96);

// South (ink) — shorter, recedes
fillPoly([
  {x: CX,     y: CY + 44},   // south tip
  {x: CX + 4, y: CY + 4},    // right shoulder
  {x: CX,     y: CY},        // center
  {x: CX - 4, y: CY + 4}     // left shoulder
], INK, 0.40);

// Center pivot cap
ctx.save();
ctx.fillStyle   = INK;
ctx.globalAlpha = 1.0;
ctx.beginPath(); ctx.arc(CX, CY, 5, 0, Math.PI * 2); ctx.fill();
ctx.fillStyle   = CREAM;
ctx.beginPath(); ctx.arc(CX, CY, 2.5, 0, Math.PI * 2); ctx.fill();
ctx.fillStyle   = INK;
ctx.beginPath(); ctx.arc(CX, CY, 1, 0, Math.PI * 2); ctx.fill();
ctx.restore();

// Restore real Math.random
Math.random = savedRandom;

</script>
